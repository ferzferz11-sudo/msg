syntax = "proto3";
package messenger;
option go_package = "./gen";

import "google/protobuf/timestamp.proto";

// ======= Server Management (Super Admin only) =======

message ServerInfo {
  string id = 1;
  string name = 2;
  string host = 3;
  int32 port = 4;
  bool is_default = 5;
  google.protobuf.Timestamp created_at = 6;
}

// AdminAuth is embedded in every server management request
message AdminAuth {
  string admin_username = 1;
  string admin_user_id = 2; // optional, will resolve to username if provided
}

message ServerListRequest {
  AdminAuth auth = 1;
}

message ServerListResponse {
  repeated ServerInfo servers = 1;
}

message AddServerRequest {
  AdminAuth auth = 1;
  string name = 2;
  string host = 3;
  int32 port = 4;
}

message AddServerResponse {
  bool success = 1;
  string message = 2;
  string server_id = 3;
}

message UpdateServerRequest {
  AdminAuth auth = 1;
  string id = 2;
  string name = 3;
  string host = 4;
  int32 port = 5;
}

message UpdateServerResponse {
  bool success = 1;
  string message = 2;
}

message DeleteServerRequest {
  AdminAuth auth = 1;
  string id = 2;
}

message DeleteServerResponse {
  bool success = 1;
  string message = 2;
}

message SetDefaultServerRequest {
  AdminAuth auth = 1;
  string id = 2;
}

message SetDefaultServerResponse {
  bool success = 1;
  string message = 2;
}

message GetDefaultServerRequest {}

message GetDefaultServerResponse {
  ServerInfo server = 1;
  bool success = 2;
  string message = 3;
}

service ServerService {
  rpc ListServers(ServerListRequest) returns (ServerListResponse);
  rpc AddServer(AddServerRequest) returns (AddServerResponse);
  rpc UpdateServer(UpdateServerRequest) returns (UpdateServerResponse);
  rpc DeleteServer(DeleteServerRequest) returns (DeleteServerResponse);
  rpc SetDefaultServer(SetDefaultServerRequest) returns (SetDefaultServerResponse);
  rpc GetDefaultServer(GetDefaultServerRequest) returns (GetDefaultServerResponse);
}
