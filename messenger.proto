syntax = "proto3";
package messenger;
option go_package = "./gen";

import "google/protobuf/timestamp.proto";

message Message {
  string id = 1;
  string user = 2;
  string text = 3;
  google.protobuf.Timestamp created_at = 4;
  repeated Reaction reactions = 5;
  string password = 6; // Password for authentication (only in first/join message)
  string replied_to_message_id = 7; // ID of the message being replied to
  string replied_to_user = 8; // Username of the message being replied to
  string replied_to_text = 9; // Text of the message being replied to
  string room_id = 10; // Room/chat ID for the message
  bool is_read = 11;
  string avatar_url = 12; // URL of the user's avatar
  string image_url = 13; // URL of the attached image
  repeated string image_urls = 20; // URLs of attached images (for gallery support)
  bool edited = 14; // Whether the message has been edited
  string client_version = 15; // Client application version
  bool is_super_admin = 16; // Whether the user is a super admin
  string voice_url = 17; // URL of the voice message audio file
  int32 duration = 18; // Duration of voice message in seconds
  bool register = 19; // Flag to register a new user
  string device_id = 21; // Device ID for tracking active sessions
  string device_name = 22; // Device name for displaying in settings
  string user_id = 23; // Stable user ID (UUID)
  bool is_e2ee = 24;   // Message is E2EE-encrypted
  string e2ee_payload = 25; // Base64-encoded encrypted data
}

message Reaction {
  string user = 1;
  string emoji = 2;
}

message ReactionRequest {
  string message_id = 1;
  Reaction reaction = 2;
}

message ReactionResponse {
  bool success = 1;
}

message ClientListRequest {}

message ClientListResponse {
  repeated string clients = 1;
}

message GetAllUsersRequest {}

message UserInfo {
  string username = 1;
  string avatar_url = 2;
  string last_client_version = 3;
  google.protobuf.Timestamp last_seen_at = 4;
  string email = 5;
}

message GetAllUsersResponse {
  repeated UserInfo users = 1;
  google.protobuf.Timestamp server_time = 2;
}

message GetAllChatsRequest {}

message GetAllChatsResponse {
  repeated ChatInfo chats = 1;
}

message CreateChatRequest {
  string target_client = 1;
}

message GetHistoryRequest {
  int32 limit = 1;
  string room = 2;
}

message GetHistoryResponse {
  repeated Message messages = 1;
}

message DeleteMessagesRequest {
  repeated Message messages = 1;
  string requester_username = 2;
}

message DeleteMessagesResponse {
  bool success = 1;
}

message TokenRequest {
  string user = 1;
  string token = 2;
  bool push_enabled = 3; // Whether to send notifications to others FROM this user
  string user_id = 4;
}

message TokenResponse {
  bool success = 1;
}

message ChatInfo {
  string id = 1;
  string name = 2;
  string type = 3;
  string participants = 4;
  google.protobuf.Timestamp created_at = 5;
  int32 unread_count = 6;
  google.protobuf.Timestamp last_message_time = 7;
  string creator = 8;
  string last_message_text = 9;
  string avatar_url = 10;
  string full_avatar_url = 11;
  string last_message_username = 12;
  bool last_message_has_image = 13;
  bool allow_members_to_add = 14;
  bool is_secret = 15;
  string peer_public_key = 16;
  bool e2ee_ready = 17;
}

message GetChatsRequest {
  string username = 1;
  string user_id = 2;
}

message GetChatsResponse {
  repeated ChatInfo chats = 1;
}

message CreateDirectChatRequest {
  string user1 = 1;
  string user2 = 2;
  string user1_id = 3;
  string user2_id = 4;
}

message CreateDirectChatResponse {
  string chat_id = 1;
  bool success = 2;
}

message CreateGroupChatRequest {
  string name = 1;
  repeated string participants = 2;
  string creator = 3;
  string creator_id = 4;
  repeated string participant_ids = 5;
}

message CreateGroupChatResponse {
  string chat_id = 1;
  bool success = 2;
}

message UpdateUsernameRequest {
  string old_username = 1;
  string new_username = 2;
  string user_id = 3;
}

message UpdateUsernameResponse {
  bool success = 1;
  string message = 2;
}

message UpdatePasswordRequest {
  string username = 1;
  string old_password = 2;
  string new_password = 3;
  string user_id = 4;
}

message UpdatePasswordResponse {
  bool success = 1;
  string message = 2;
}

message AdminUpdatePasswordRequest {
  string target_username = 1;
  string new_password = 2;
  string admin_username = 3;
  string admin_user_id = 4;
}

message AdminUpdatePasswordResponse {
  bool success = 1;
  string message = 2;
}

message MarkReadRequest {
  string room_id = 1;
  string username = 2;
  string user_id = 3;
}

message MarkReadResponse {
  bool success = 1;
}

message UpdateAvatarRequest {
  string username = 1;
  string avatar_url = 2;
  string full_avatar_url = 3;
  string user_id = 4;
}

message UpdateAvatarResponse {
  bool success = 1;
  string message = 2;
}

message UpdateProfileRequest {
  string username = 1;
  string bio = 2;
  string status = 3;
  string user_id = 4;
}

message UpdateProfileResponse {
  bool success = 1;
  string message = 2;
}

message GetUserProfileRequest {
  string username = 1;
  string user_id = 2;
}

message GetUserProfileResponse {
  string username = 1;
  string bio = 2;
  string status = 3;
  string avatar_url = 4;
  google.protobuf.Timestamp last_seen_at = 5;
  string full_avatar_url = 6;
}

message GetUserAvatarRequest {
  string username = 1;
  string user_id = 2;
}

message GetUserAvatarResponse {
  string avatar_url = 1;
  string full_avatar_url = 2;
}

message AddParticipantRequest {
  string chat_id = 1;
  string username = 2;
  string user_id = 3;
}

message AddParticipantResponse {
  bool success = 1;
  string message = 2;
}

message RemoveParticipantRequest {
  string chat_id = 1;
  string username = 2;
  string user_id = 3;
}

message RemoveParticipantResponse {
  bool success = 1;
  string message = 2;
}

message EditMessageRequest {
  string message_id = 1;
  string text = 2;
}

message EditMessageResponse {
  bool success = 1;
  string message = 2;
}

message DeleteChatRequest {
  string chat_id = 1;
  string requester_username = 2;
  string requester_user_id = 3;
}

message DeleteChatResponse {
  bool success = 1;
  string message = 2;
}

message DeleteProfileRequest {
  string username = 1;
  string user_id = 2;
}

message DeleteProfileResponse {
  bool success = 1;
  string message = 2;
}

message AddContactRequest {
  string username = 1;
  string contact_username = 2;
  string user_id = 3;
}

message AddContactResponse {
  bool success = 1;
  string message = 2;
}

message RemoveContactRequest {
  string username = 1;
  string contact_username = 2;
  string user_id = 3;
}

message RemoveContactResponse {
  bool success = 1;
  string message = 2;
}

message GetContactsRequest {
  string username = 1;
  string user_id = 2;
}

message GetContactsResponse {
  repeated string contacts = 1;
}

message GetChatListVersionRequest {
  string username = 1;
  string user_id = 2;
}

message GetChatListVersionResponse {
  int64 version = 1;
}

message CustomTheme {
  string id = 1;
  string name = 2;
  string primary_color = 3;
  string on_primary_color = 4;
  string surface_color = 5;
  string on_surface_color = 6;
  string background_color = 7;
  string text_primary_color = 8;
  string text_secondary_color = 9;
  bool is_dark = 10;
  string chat_background_image_url = 11;
  string chat_list_background_image_url = 12;
  string bottom_panel_color = 13;
  string on_bottom_panel_color = 14;
  string surface_container = 15;
  string outgoing_bubble_color = 16;
  string incoming_bubble_color = 17;
  string outgoing_text_color = 18;
  string incoming_text_color = 19;
}

message GetThemesRequest {
  string username = 1;
  string user_id = 2;
}

message GetThemesResponse {
  string current_theme_id = 1;
  repeated CustomTheme custom_themes = 2;
}

message SaveThemeRequest {
  string username = 1;
  CustomTheme theme = 2;
  string user_id = 3;
}

message SaveThemeResponse {
  bool success = 1;
  string message = 2;
}

message SetCurrentThemeRequest {
  string username = 1;
  string theme_id = 2;
  string user_id = 3;
}

message SetCurrentThemeResponse {
  bool success = 1;
}

message DeleteThemeRequest {
  string username = 1;
  string theme_id = 2;
  string user_id = 3;
}

message DeleteThemeResponse {
  bool success = 1;
}

message UpdateChatNameRequest {
  string chat_id = 1;
  string new_name = 2;
}

message UpdateChatNameResponse {
  bool success = 1;
  string message = 2;
}

message UpdateChatAvatarRequest {
  string chat_id = 1;
  string avatar_url = 2;
  string username = 3; // For admin verification
  string full_avatar_url = 4;
  string user_id = 5;
}

message UpdateChatAvatarResponse {
  bool success = 1;
  string message = 2;
}

message UpdateChatSettingsRequest {
  string chat_id = 1;
  bool allow_members_to_add = 2;
  string user_id = 3;
}

message UpdateChatSettingsResponse {
  bool success = 1;
  string message = 2;
}

message GetFCMLogsRequest {}

message FCMLogEntry {
  string timestamp = 1;
  string level = 2;
  string message = 3;
}

message GetFCMLogsResponse {
  repeated FCMLogEntry logs = 1;
}

message SaveDraftRequest {
  string user_id = 1;
  string room_id = 2;
  string draft_text = 3;
  string replied_to_message_id = 4;
  string replied_to_user = 5;
  string replied_to_text = 6;
}

message SaveDraftResponse {
  bool success = 1;
  string message = 2;
}

message GetDraftRequest {
  string user_id = 1;
  string room_id = 2;
}

message GetDraftResponse {
  string draft_text = 1;
  string replied_to_message_id = 2;
  string replied_to_user = 3;
  string replied_to_text = 4;
  bool has_draft = 5;
}

message DeleteDraftRequest {
  string user_id = 1;
  string room_id = 2;
}

message DeleteDraftResponse {
  bool success = 1;
}

message GetMutedChatsRequest {
  string user_id = 1;
}

message GetMutedChatsResponse {
  repeated string room_ids = 1;
}

message SetMutedChatRequest {
  string user_id = 1;
  string room_id = 2;
  bool muted = 3;
}

message SetMutedChatResponse {
  bool success = 1;
}

message GetUserIdRequest {
  string username = 1;
}

message GetUserIdResponse {
  string user_id = 1;
  bool found = 2;
}

message AddFavoriteRequest {
  string user_id = 1;
  string message_id = 2;
}

message AddFavoriteResponse {
  bool success = 1;
  string message = 2;
}

message RemoveFavoriteRequest {
  string user_id = 1;
  string message_id = 2;
}

message RemoveFavoriteResponse {
  bool success = 1;
}

message GetFavoritesRequest {
  string user_id = 1;
}

message GetFavoritesResponse {
  repeated Message messages = 1;
}

message TypingRequest {
  string room_id = 1;
  string username = 2;
  bool is_typing = 3;
  string user_id = 4;
}

message TypingSignal {
  string room_id = 1;
  string username = 2;
  bool is_typing = 3;
}

message DeviceInfo {
  string device_id = 1;
  string device_name = 2;
  string client_version = 3;
  google.protobuf.Timestamp last_seen_at = 4;
  string ip_address = 5;
}

message GetDevicesRequest {
  string user_id = 1;
}

message GetDevicesResponse {
  repeated DeviceInfo devices = 1;
}

message DeleteDeviceRequest {
  string user_id = 1;
  string device_id = 2;
}

message DeleteDeviceResponse {
  bool success = 1;
  string message = 2;
}

message RequestPasswordResetRequest {
  string email = 1;
}

message RequestPasswordResetResponse {
  bool success = 1;
  string message = 2;
}

message ResetPasswordRequest {
  string token = 1;
  string new_password = 2;
}

message ResetPasswordResponse {
  bool success = 1;
  string message = 2;
}

message CallMessage {
  string call_id = 1;
  string sender_id = 2;
  string receiver_id = 3;
  string sender_name = 6;
  string receiver_name = 7;
  string room_id = 8;

  enum Type {
    INITIATE = 0;    // Абонент А звонит Абоненту Б
    ACCEPT = 1;      // Абонент Б принял вызов
    REJECT = 2;      // Абонент Б отклонил вызов
    HANGUP = 3;      // Завершение звонка
    OFFER = 4;       // WebRTC SDP Offer
    ANSWER = 5;      // WebRTC SDP Answer
    ICE_CANDIDATE = 6; // WebRTC ICE Candidate

    // Group Conference
    INITIATE_CONFERENCE = 10;
    JOIN_CONFERENCE = 11;
    LEAVE_CONFERENCE = 12;
    END_CONFERENCE = 13;
    INVITE_TO_CONFERENCE = 14;
    REMOVE_FROM_CONFERENCE = 15;
    UPDATE_CONFERENCE = 16;
  }
  Type type = 4;

  string payload = 5; // JSON-строка с SDP или ICE данными
}

service ChatService {
  rpc Chat(stream Message) returns (stream Message);
  rpc Typing(stream TypingRequest) returns (stream TypingSignal);
  rpc CallSession (stream CallMessage) returns (stream CallMessage);
  rpc GetClients(ClientListRequest) returns (ClientListResponse);
  rpc GetAllUsers(GetAllUsersRequest) returns (GetAllUsersResponse);
  rpc GetAllChats(GetAllChatsRequest) returns (GetAllChatsResponse);
  rpc GetHistory(GetHistoryRequest) returns (GetHistoryResponse);
  rpc SetReaction(ReactionRequest) returns (ReactionResponse);
  rpc DeleteMessages(DeleteMessagesRequest) returns (DeleteMessagesResponse);
  rpc RegisterToken(TokenRequest) returns (TokenResponse);
  rpc GetChats(GetChatsRequest) returns (GetChatsResponse);
  rpc GetChatListVersion(GetChatListVersionRequest) returns (GetChatListVersionResponse);
  rpc CreateDirectChat(CreateDirectChatRequest) returns (CreateDirectChatResponse);
  rpc CreateGroupChat(CreateGroupChatRequest) returns (CreateGroupChatResponse);
  rpc UpdateUsername(UpdateUsernameRequest) returns (UpdateUsernameResponse);
  rpc UpdatePassword(UpdatePasswordRequest) returns (UpdatePasswordResponse);
  rpc AdminUpdatePassword(AdminUpdatePasswordRequest) returns (AdminUpdatePasswordResponse);
  rpc MarkRead(MarkReadRequest) returns (MarkReadResponse);
  rpc UpdateAvatar(UpdateAvatarRequest) returns (UpdateAvatarResponse);
  rpc UpdateProfile(UpdateProfileRequest) returns (UpdateProfileResponse);
  rpc GetUserProfile(GetUserProfileRequest) returns (GetUserProfileResponse);
  rpc GetUserAvatar(GetUserAvatarRequest) returns (GetUserAvatarResponse);
  rpc AddParticipant(AddParticipantRequest) returns (AddParticipantResponse);
  rpc RemoveParticipant(RemoveParticipantRequest) returns (RemoveParticipantResponse);
  rpc EditMessage(EditMessageRequest) returns (EditMessageResponse);
  rpc UpdateChatName(UpdateChatNameRequest) returns (UpdateChatNameResponse);
  rpc UpdateChatAvatar(UpdateChatAvatarRequest) returns (UpdateChatAvatarResponse);
  rpc UpdateChatSettings(UpdateChatSettingsRequest) returns (UpdateChatSettingsResponse);
  rpc DeleteChat(DeleteChatRequest) returns (DeleteChatResponse);
  rpc DeleteProfile(DeleteProfileRequest) returns (DeleteProfileResponse);
  rpc AddContact(AddContactRequest) returns (AddContactResponse);
  rpc RemoveContact(RemoveContactRequest) returns (RemoveContactResponse);
  rpc GetContacts(GetContactsRequest) returns (GetContactsResponse);
  rpc GetThemes(GetThemesRequest) returns (GetThemesResponse);
  rpc SaveTheme(SaveThemeRequest) returns (SaveThemeResponse);
  rpc SetCurrentTheme(SetCurrentThemeRequest) returns (SetCurrentThemeResponse);
  rpc DeleteTheme(DeleteThemeRequest) returns (DeleteThemeResponse);
  rpc GetFCMLogs(GetFCMLogsRequest) returns (GetFCMLogsResponse);
  rpc SaveDraft(SaveDraftRequest) returns (SaveDraftResponse);
  rpc GetDraft(GetDraftRequest) returns (GetDraftResponse);
  rpc DeleteDraft(DeleteDraftRequest) returns (DeleteDraftResponse);
  rpc GetMutedChats(GetMutedChatsRequest) returns (GetMutedChatsResponse);
  rpc SetMutedChat(SetMutedChatRequest) returns (SetMutedChatResponse);
  rpc GetUserId(GetUserIdRequest) returns (GetUserIdResponse);
  rpc AddFavorite(AddFavoriteRequest) returns (AddFavoriteResponse);
  rpc RemoveFavorite(RemoveFavoriteRequest) returns (RemoveFavoriteResponse);
  rpc GetFavorites(GetFavoritesRequest) returns (GetFavoritesResponse);
  rpc SaveFavoriteMessage(Message) returns (AddFavoriteResponse);
  rpc GetDevices(GetDevicesRequest) returns (GetDevicesResponse);
  rpc DeleteDevice(DeleteDeviceRequest) returns (DeleteDeviceResponse);
  rpc DeleteOtherDevices(DeleteDeviceRequest) returns (DeleteDeviceResponse);
  rpc RequestPasswordReset(RequestPasswordResetRequest) returns (RequestPasswordResetResponse);
  rpc ResetPassword(ResetPasswordRequest) returns (ResetPasswordResponse);

  // Secret Chats (E2EE)
  rpc CreateSecretChat(CreateSecretChatRequest) returns (CreateSecretChatResponse);
  rpc ExchangeSecretKey(ExchangeSecretKeyRequest) returns (ExchangeSecretKeyResponse);
  rpc GetSecretChatKey(GetSecretChatKeyRequest) returns (GetSecretChatKeyResponse);

  // OWL AI Assistant
  rpc ChatWithOWL(OWLRequest) returns (stream OWLResponse);
}

// ======= Secret Chat Messages =======

message CreateSecretChatRequest {
  string target_username = 1;
  string target_user_id = 2;
  string public_key = 3;
  string client_version = 4;
}

message CreateSecretChatResponse {
  string chat_id = 1;
  bool success = 2;
  string message = 3;
  string peer_public_key = 4;
}

message ExchangeSecretKeyRequest {
  string chat_id = 1;
  string public_key = 2;
}

message ExchangeSecretKeyResponse {
  bool success = 1;
  string peer_public_key = 2;
  bool peer_has_key = 3;
}

message GetSecretChatKeyRequest {
  string chat_id = 1;
}

message GetSecretChatKeyResponse {
  string peer_public_key = 1;
  bool peer_has_key = 2;
}

// ======= OWL AI Assistant =======

message OWLRequest {
  string user_id = 1;
  string message = 2;
  string session_id = 3;
  string model = 4;
  string api_key = 5;
}

message OWLResponse {
  string text = 1;
  bool finished = 2;
  string error = 3;
}